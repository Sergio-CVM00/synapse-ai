services:
  - name: synapse-ai
    repo: https://github.com/Sergio-CVM00/synapse-ai
    region: oregon
    buildCommand: pip install -r apps/agent/requirements.txt && uvicorn apps.agent.main:app --host 0.0.0.0 --port 8000
    startCommand: uvicorn apps.agent.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://jmuwoizqmdznlwhrdjbr.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false